<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Main Geometric Icon -->
  <path d="M40 140V60L100 120L160 60V140" stroke="white" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Accent 'S' / Bridge element -->
  <path d="M70 100H130" stroke="#a78bfa" stroke-width="12" stroke-linecap="round" opacity="0.8"/>
  
  <!-- Subtle Glow Effect (SVG Filter) -->
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
</svg>
